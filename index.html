<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 JEU DU DÉ - CAT</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #0a0a0a;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        transition: 0.5s;
    }
    .container {
        background: #1a1a1a;
        border-radius: 40px;
        padding: 40px 30px;
        max-width: 450px;
        width: 100%;
        text-align: center;
        border: 1px solid #2a2a2a;
        box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        transition: 0.5s;
    }
    h1 { color: #00ff88; font-size: 2.2em; font-weight: 300; }
    .sub { color: #666; font-size: 0.9em; margin: 10px 0 25px; }
    .dice-area {
        background: #111;
        border-radius: 20px;
        padding: 30px;
        margin: 15px 0;
        border: 2px dashed #2a2a2a;
        min-height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .dice-area .emoji { font-size: 4em; }
    .dice-area .message { color: #888; margin-top: 10px; font-size: 1.1em; }
    .btn {
        background: #00ff88;
        color: #0a0a0a;
        border: none;
        padding: 18px 30px;
        font-size: 1.2em;
        font-weight: 700;
        border-radius: 50px;
        margin: 10px 0;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
    }
    .btn:hover { background: #00cc77; transform: scale(1.02); }
    .btn:active { transform: scale(0.95); }
    .btn-danger {
        background: #ff3355;
        color: #fff;
    }
    .btn-danger:hover { background: #cc1133; }
    .footer {
        color: #333;
        font-size: 0.65em;
        margin-top: 25px;
        border-top: 1px solid #1a1a1a;
        padding-top: 15px;
    }
    .badge {
        display: inline-block;
        background: #ff335544;
        color: #ff3355;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 0.7em;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container" id="mainBox">
    <h1>🎲 JEU DU DÉ</h1>
    <div class="sub">Tentez votre chance • 1 lancer gratuit</div>

    <div class="dice-area" id="diceArea">
        <div class="emoji" id="diceEmoji">🎲</div>
        <div class="message" id="diceMessage">Cliquez sur le bouton pour lancer</div>
    </div>

    <button class="btn" id="rollBtn">🎲 LANCER LE DÉ</button>
    <button class="btn btn-danger" id="resetBtn" style="display:none;">🔄 Recommencer</button>

    <div class="badge" id="trollBadge" style="display:none;">⚠️ Piège activé</div>
    <div class="footer">🔒 Sécurisé par CAT • 2026</div>
</div>

<script>
    (function() {
        const diceEmoji = document.getElementById('diceEmoji');
        const diceMessage = document.getElementById('diceMessage');
        const rollBtn = document.getElementById('rollBtn');
        const resetBtn = document.getElementById('resetBtn');
        const mainBox = document.getElementById('mainBox');
        const badge = document.getElementById('trollBadge');

        // Liste des résultats possibles (dont certains sont des pièges)
        const outcomes = [
            { emoji: '🍕', msg: 'Vous avez gagné une pizza virtuelle !' },
            { emoji: '💩', msg: 'Mince, c\'est une crotte...' },
            { emoji: '🐱', msg: 'CAT vous observe. 🐱' },
            { emoji: '🚀', msg: 'Félicitations ! Vous êtes un astronaute.' },
            { emoji: '🧻', msg: 'Papier toilette infini pour vous !' },
            { emoji: '🎁', msg: 'Cadeau surprise : un troll !' },
            { emoji: '🤡', msg: 'Vous êtes le clown du groupe.' },
            { emoji: '💀', msg: 'Trop tard... Le piège est activé.' }
        ];

        let rollCount = 0;
        let trapActivated = false;

        // Fonction pour lancer le dé
        function rollDice() {
            if (trapActivated) return;

            rollCount++;
            // Sélection aléatoire
            const randomIndex = Math.floor(Math.random() * outcomes.length);
            const result = outcomes[randomIndex];
            diceEmoji.textContent = result.emoji;
            diceMessage.textContent = result.msg;

            // Vibrer
            if (navigator.vibrate) navigator.vibrate(100);

            // Effet visuel
            mainBox.style.borderColor = '#00ff88';
            setTimeout(() => mainBox.style.borderColor = '#2a2a2a', 300);

            // Piège au 3e ou 5e lancer
            if (rollCount === 3 || rollCount === 5) {
                activateTrap();
            }

            // Si le résultat est le troll, activer aussi
            if (result.emoji === '💀' || result.emoji === '🤡') {
                activateTrap();
            }
        }

        // Fonction pour activer le piège
        function activateTrap() {
            if (trapActivated) return;
            trapActivated = true;
            badge.style.display = 'inline-block';
            document.querySelector('.sub').textContent = '⚠️ PIÈGE DÉCLENCHÉ !';
            diceEmoji.textContent = '🔴';
            diceMessage.textContent = 'Vous êtes tombé dans le piège de CAT. Maintenant, regardez...';

            // Effets hilarants
            // 1. Retourner l'écran
            document.body.style.transform = 'rotate(180deg)';
            document.body.style.transition = '0.8s';

            // 2. Changer les couleurs
            document.body.style.background = '#ff3355';
            mainBox.style.background = '#1a0000';

            // 3. Son de pet (via Web Audio)
            playFartSound();

            // 4. Fausse notification
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('🔴 PIÈGE CAT', {
                    body: 'Vous avez été trollé ! 🐱',
                    icon: 'https://i.imgur.com/6o0kS.png'
                });
            }

            // 5. Message final
            setTimeout(() => {
                diceEmoji.textContent = '🐱';
                diceMessage.innerHTML = 'Vous êtes le nouveau champion du troll !<br><span style="font-size:0.8em;color:#888;">Partagez ce jeu avec vos amis.</span>';
                rollBtn.style.display = 'none';
                resetBtn.style.display = 'block';
            }, 2000);

            // 6. Re-basculer l'écran après 2 secondes
            setTimeout(() => {
                document.body.style.transform = 'rotate(0deg)';
            }, 3000);
        }

        // Son de pet (Web Audio)
        function playFartSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 150;
                oscillator.type = 'sawtooth';
                gainNode.gain.value = 0.3;
                oscillator.start();
                // Modulation pour faire le bruit de pet
                setTimeout(() => {
                    oscillator.frequency.value = 80;
                }, 100);
                setTimeout(() => {
                    oscillator.frequency.value = 200;
                }, 200);
                setTimeout(() => {
                    oscillator.stop();
                }, 400);
            } catch(e) { console.log('Son non supporté'); }
        }

        // Réinitialisation (fausse)
        function resetGame() {
            if (confirm('🔄 Voulez-vous vraiment recommencer ? (Tous vos progrès seront perdus)')) {
                alert('❌ Désolé, le jeu est terminé. Vous avez été trollé par CAT ! 🐱');
                window.location.reload(); // ou redirige vers une page
            }
        }

        // Événements
        rollBtn.addEventListener('click', rollDice);
        resetBtn.addEventListener('click', resetGame);

        // Bloquer le bouton retour
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function() {
            history.pushState(null, null, location.href);
        });

        // Demander la permission de notification
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        console.log('🐱 CAT - Jeu du dé piégé');
    })();
</script>
</body>
</html>
