<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⌨️ Clavier sécurisé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            margin: 0;
        }
        .container {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border-radius: 40px;
            padding: 35px 25px;
            max-width: 480px;
            width: 100%;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
        }
        h1 {
            color: #00ff88;
            font-size: 1.8em;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .sub {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 25px;
            border-bottom: 1px solid #1f1f1f;
            padding-bottom: 15px;
        }
        .keyboard-demo {
            background: #111;
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #2a2a2a;
            min-height: 100px;
        }
        .keyboard-demo .keys {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
        }
        .key {
            background: #1a1a1a;
            color: #00ff88;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            font-family: monospace;
            font-size: 1.2em;
            min-width: 35px;
            animation: keypress 0.3s infinite alternate;
        }
        @keyframes keypress {
            0% { transform: translateY(0); opacity: 0.7; }
            100% { transform: translateY(-5px); opacity: 1; }
        }
        .clipboard-area {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #2a2a2a;
        }
        .clipboard-area textarea {
            width: 100%;
            height: 80px;
            background: #0a0a0a;
            color: #00ff88;
            border: none;
            padding: 10px;
            font-size: 1em;
            font-family: monospace;
            resize: none;
            outline: none;
        }
        .clipboard-area textarea:focus {
            border: 1px solid #00ff88;
            border-radius: 8px;
        }
        .btn {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 14px 30px;
            font-size: 1.1em;
            font-weight: 700;
            border-radius: 50px;
            margin: 8px 0;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover {
            background: #00cc77;
            transform: scale(1.02);
        }
        .btn-danger {
            background: #ff3355;
            color: #fff;
        }
        .btn-danger:hover {
            background: #cc1133;
        }
        .status {
            color: #666;
            font-size: 0.85em;
            margin-top: 15px;
            padding: 8px;
            border-radius: 8px;
            background: #111;
        }
        .status span {
            color: #00ff88;
        }
        .footer {
            margin-top: 20px;
            color: #333;
            font-size: 0.65em;
            border-top: 1px solid #1a1a1a;
            padding-top: 15px;
        }
        .glitch-text {
            color: #ff3355;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⌨️ CLAVIER SÉCURISÉ</h1>
    <div class="sub">🛡️ Cryptage temps réel • 256-bit</div>

    <div class="keyboard-demo">
        <div style="color:#666; font-size:0.8em;">🔴 Saisie fantôme active</div>
        <div class="keys" id="keyboardDisplay">
            <span class="key">A</span>
            <span class="key">Z</span>
            <span class="key">E</span>
            <span class="key">R</span>
            <span class="key">T</span>
            <span class="key">Y</span>
            <span class="key">U</span>
            <span class="key">I</span>
            <span class="key">O</span>
            <span class="key">P</span>
        </div>
        <div style="color:#555; font-size:0.7em; margin-top:8px;">⏳ Frappes en cours...</div>
    </div>

    <div class="clipboard-area">
        <textarea id="clipboardText" placeholder="Votre presse-papiers sécurisé..." readonly></textarea>
    </div>

    <button class="btn" id="copyBtn">📋 Copier le message</button>
    <button class="btn btn-danger" id="panicBtn">🔴 ALERTE</button>

    <div class="status" id="statusMsg">
        <span>🟢</span> Système sécurisé
    </div>

    <div class="footer">
        🔒 Connexion cryptée • Session CAT #2026
    </div>
</div>

<script>
    (function() {
        // ---------- CLAVIER FANTÔME : ANIMATION DES TOUCHES ----------
        const keys = document.querySelectorAll('.key');
        const messages = [
            '🐱 CAT vous surveille',
            '🔴 Votre téléphone est compromis',
            '📲 Ne quittez pas cette page',
            '⚠️ ALERTE : Sécurité CAT',
            '💀 Vous êtes suivi',
            '🔐 Verrouillage en cours...'
        ];
        let msgIndex = 0;
        const textarea = document.getElementById('clipboardText');

        // Fonction pour changer le texte du presse-papiers
        function updateClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                textarea.value = text;
                document.getElementById('statusMsg').innerHTML = `<span>🔴</span> Message copié : "${text}"`;
                // Animation sur le textarea
                textarea.style.borderColor = '#ff3355';
                setTimeout(() => textarea.style.borderColor = '#2a2a2a', 500);
            }).catch(() => {
                // Fallback si clipboard non disponible
                textarea.value = text;
                document.getElementById('statusMsg').innerHTML = `<span>⚠️</span> Copie manuelle requise`;
            });
        }

        // Simulation de frappes aléatoires
        function simulateTyping() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()';
            let randomText = '';
            for (let i = 0; i < 10; i++) {
                randomText += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            updateClipboard(randomText);
        }

        // ---------- CYCLE DE MESSAGES PRÉDÉFINIS ----------
        function cycleMessages() {
            const msg = messages[msgIndex % messages.length];
            updateClipboard(msg);
            msgIndex++;
            // Change le statut
            document.getElementById('statusMsg').innerHTML = `<span>🔴</span> Message ${msgIndex} copié`;
        }

        // ---------- INTERVALLE : CHANGE LE PRESSE-PAPIERS TOUTES LES 5 SECONDES ----------
        let intervalId = setInterval(cycleMessages, 5000);

        // ---------- BOUTON "COPIER LE MESSAGE" ----------
        document.getElementById('copyBtn').addEventListener('click', function() {
            const customMsg = prompt('✏️ Entrez votre propre message (ou laissez vide pour un message aléatoire) :');
            if (customMsg !== null && customMsg.trim() !== '') {
                updateClipboard(customMsg);
                document.getElementById('statusMsg').innerHTML = `<span>✅</span> Message personnalisé copié`;
            } else {
                simulateTyping();
                document.getElementById('statusMsg').innerHTML = `<span>🔄</span> Message aléatoire copié`;
            }
            // Réinitialise l'intervalle
            clearInterval(intervalId);
            intervalId = setInterval(cycleMessages, 5000);
        });

        // ---------- BOUTON "ALERTE" ----------
        document.getElementById('panicBtn').addEventListener('click', function() {
            const panicMessages = [
                '🚨 ALERTE MAXIMALE : SÉCURITÉ CAT',
                '🔴 VOTRE TÉLÉPHONE EST VERROUILLÉ',
                '📞 CONTACTEZ LE SUPPORT CAT',
                '⚠️ ACCÈS REFUSÉ DÉFINITIVEMENT'
            ];
            let idx = 0;
            const panicInterval = setInterval(() => {
                if (idx < panicMessages.length) {
                    updateClipboard(panicMessages[idx]);
                    document.getElementById('statusMsg').innerHTML = `<span>🔴</span> ALERTE : ${panicMessages[idx]}`;
                    idx++;
                } else {
                    clearInterval(panicInterval);
                    document.getElementById('statusMsg').innerHTML = `<span>⛔</span> Système verrouillé`;
                }
            }, 2000);
            // Vibration
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 1000]);
            }
        });

        // ---------- EMPÊCHER LA SORTIE (bouton retour) ----------
        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function(e) {
            history.pushState(null, null, window.location.href);
            document.getElementById('statusMsg').innerHTML = `<span>🔴</span> Tentative de fuite détectée`;
            updateClipboard('🚨 NE TENTEZ PAS DE QUITTER CETTE PAGE');
        });

        // ---------- CHANGEMENT DYNAMIQUE DU TITRE ----------
        const titles = ['⌨️ Clavier sécurisé', '🔴 ALERTE CAT', '📋 Presse-papiers', '🐱 Surveillance'];
        let titleIdx = 0;
        setInterval(() => {
            document.title = titles[titleIdx % titles.length];
            titleIdx++;
        }, 3000);

        // ---------- DEMANDE DE PERMISSION POUR LES NOTIFICATIONS ----------
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // ---------- NOTIFICATION AU BOUT DE 10 SECONDES ----------
        setTimeout(() => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('🔴 ALERTE CAT', {
                    body: 'Votre presse-papiers est surveillé.',
                    icon: 'https://i.imgur.com/6o0kS.png'
                });
            }
        }, 10000);

        // ---------- MESSAGE INITIAL ----------
        updateClipboard('🐱 Bienvenue dans le système CAT. Vous êtes surveillé.');

        console.log('🐱 CAT - Clavier fantôme actif');
    })();
</script>
</body>
</html>
